<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Staff Orders | Brew Beans</title>
    <meta name="robots" content="noindex, nofollow">
    <link rel="icon" type="image/png" sizes="32x32" href="img/favicon-32.png">
    <link rel="icon" type="image/png" sizes="192x192" href="img/favicon-192.png">
    <link rel="apple-touch-icon" sizes="180x180" href="img/favicon-180.png">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link href="https://cdn.jsdelivr.net/npm/aos@2.3.4/dist/aos.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="scroll-progress" id="scrollProgress"></div>

    <section class="staff-page">
        <div class="container">
            <div id="loginView">
                <div class="staff-login-card" data-aos="zoom-in-up" data-aos-duration="700">
                    <h3 class="mb-4 text-center" data-aos="fade-down" data-aos-delay="150"><i class="bi bi-shield-lock me-2"></i>Staff Login</h3>
                    <form id="pinForm">
                        <div class="mb-3" data-aos="fade-up" data-aos-delay="250">
                            <label class="form-label">PIN</label>
                            <input type="password" inputmode="numeric" class="form-control form-control-lg text-center" id="pinInput" placeholder="••••••" required>
                        </div>
                        <div data-aos="fade-up" data-aos-delay="320">
                            <button type="submit" class="btn btn-primary w-100" id="loginBtn">Login</button>
                        </div>
                        <div id="loginError" class="alert alert-danger mt-3" style="display:none;"></div>
                    </form>
                </div>
            </div>

            <div id="ordersView" style="display:none;">
                <div class="d-flex justify-content-between align-items-center mb-3 flex-wrap gap-2" data-aos="fade-down">
                    <h3 class="mb-0"><i class="bi bi-list-check me-2"></i>Orders</h3>
                    <div class="d-flex gap-2 staff-actions">
                        <button class="btn btn-sm" id="notifyBtn" title="Enable new-order alerts"><i class="bi bi-bell me-1"></i>Alerts: Off</button>
                        <button class="btn btn-sm" id="refreshBtn"><i class="bi bi-arrow-clockwise me-1"></i>Refresh</button>
                        <button class="btn btn-sm staff-action-danger" id="logoutBtn"><i class="bi bi-box-arrow-right me-1"></i>Logout</button>
                    </div>
                </div>

                <div class="d-flex flex-wrap gap-2 mb-3 align-items-center" data-aos="fade-up" data-aos-delay="100">
                    <div class="btn-group btn-group-sm flex-wrap" id="statusFilter" role="group">
                        <button type="button" class="btn btn-outline-primary active" data-filter="active">Active</button>
                        <button type="button" class="btn btn-outline-primary" data-filter="all">All</button>
                        <button type="button" class="btn btn-outline-primary" data-filter="completed">Completed</button>
                        <button type="button" class="btn btn-outline-primary" data-filter="cancelled">Cancelled</button>
                    </div>
                    <div class="staff-search ms-auto">
                        <i class="bi bi-search staff-search-icon" aria-hidden="true"></i>
                        <input type="search" class="form-control" id="searchInput" placeholder="Search by order ID, name, or phone" aria-label="Search orders">
                        <button type="button" class="staff-search-clear" id="searchClear" aria-label="Clear search" hidden><i class="bi bi-x-lg"></i></button>
                    </div>
                </div>

                <div id="ordersList"></div>
                <div id="noOrders" class="staff-empty" style="display:none;" role="status" aria-live="polite">
                    <span class="staff-empty-icon"><i class="bi bi-cup-hot" aria-hidden="true"></i></span>
                    <p class="staff-empty-title" id="noOrdersTitle">No orders match</p>
                    <p class="staff-empty-hint" id="noOrdersHint">Nothing waiting right now.</p>
                </div>
            </div>
        </div>
    </section>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jquery@3.7.1/dist/jquery.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/aos@2.3.4/dist/aos.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/motion@12.42.2/dist/motion.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase-config.js"></script>
    <script src="js/staff.js"></script>
    <script src="js/scroll-fx.js"></script>
</body>
</html>
